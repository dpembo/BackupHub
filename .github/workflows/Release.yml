name: Build and Attest Release


on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the Docker image (e.g., 2026.03.22.01) — leave blank for auto-versioning'
        required: false
        type: string

# Add this permissions block
permissions:
  id-token: write
  contents: read
  attestations: write
  packages: write
  
jobs:
  build-and-attest:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent/package-lock.json

      - name: Set version (auto or manual)
        id: set_version
        run: |
          set -e
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
            echo "Manual version input: $version"
          else
            echo "No manual version provided, attempting auto-versioning..."
            chmod +x .github/workflows/_get-version.sh
            version=$(.github/workflows/_get-version.sh "${{ secrets.GITHUB_TOKEN }}")
            if [ -z "$version" ]; then
              echo "Auto-versioning failed, please provide a version manually."
              exit 1
            fi
            echo "Auto-generated version: $version"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests (with coverage)
        run: npm run test:coverage

      - name: Upload server coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: coverage/

      - name: Install agent dependencies
        run: |
          cd agent
          npm ci

      - name: Run agent tests (with coverage)
        run: |
          cd agent
          npm run test:coverage

      - name: Upload agent coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: agent/coverage/

      - name: Set version and create agent tar
        run: |
          replace_text() {
              local search_text="$1"
              local replacement_text="$2"
              local file_path="$3"

              # Check if the file exists
              if [ ! -f "$file_path" ]; then
                  echo "File $file_path does not exist."
                  exit 1
              fi

              # Perform the replacement
              sed -i "s/$search_text/$replacement_text/g" "$file_path"
          }

          version="${{ steps.set_version.outputs.version }}"
          if [ -z "$version" ]; then
              echo "Version is not provided."
              exit 1
          fi

          findText="var version=\"%%UNDEFINED%%\";"
          replText="var version=\"${version}\";"

          echo "Setting version number in hub and agent build"
          replace_text "$findText" "$replText" version.js
          replace_text "$findText" "$replText" ./agent/version.js

          echo "Create the agent tar for install from the web ux"
          tar -cvf ./public/agent/agent.tar -C ./agent .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: GHCR auth preflight
        shell: bash
        run: |
          set -euo pipefail

          headers_file="$(mktemp)"
          status_code="$(curl -sS -D "$headers_file" -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)"

          if [ "$status_code" -ne 200 ]; then
            echo "GitHub token preflight failed: /user returned HTTP $status_code"
            exit 1
          fi

          scopes="$(tr -d '\r' < "$headers_file" | awk -F': ' 'tolower($1)=="x-oauth-scopes" {print $2}')"
          echo "Detected token scopes: ${scopes:-none}"

          if ! echo "${scopes:-}" | grep -Eq '(^|, )write:packages(,|$)'; then
            echo "Token is missing write:packages scope, which is required to push ghcr.io images."
            exit 1
          fi

      - name: Build and push Orchelium/hub image
        id: build-and-push-hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/dpembo/orchelium/hub:latest
            ghcr.io/dpembo/orchelium/hub:${{ steps.set_version.outputs.version }}
          labels: |
            org.opencontainers.image.title=dpembo/orchelium/hub
            org.opencontainers.image.version=${{ steps.set_version.outputs.version }}

      - name: Attest build provenance for Orchelium/hub
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/dpembo/orchelium/hub
          subject-digest: ${{ steps.build-and-push-hub.outputs.digest }}
          push-to-registry: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Orchelium/agent image
        id: build-and-push-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          tags: |
            ghcr.io/dpembo/orchelium/agent:latest
            ghcr.io/dpembo/orchelium/agent:${{ steps.set_version.outputs.version }}
          labels: |
            org.opencontainers.image.title=dpembo/orchelium/agent
            org.opencontainers.image.version=${{ steps.set_version.outputs.version }}

      - name: Attest build provenance for orchelium/agent
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/dpembo/orchelium/agent
          subject-digest: ${{ steps.build-and-push-agent.outputs.digest }}
          push-to-registry: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Release
        shell: bash
        run: |
          ./gitRelease.sh ${{ vars.ORG_NAME }} ${{ vars.REPO_NAME }} ${{ vars.BRANCH_NAME }} ${{ secrets.PAT_TOKEN }} "v${{ steps.set_version.outputs.version }}" "v${{ steps.set_version.outputs.version }}" "Orchelium [v${{ steps.set_version.outputs.version }}]"


