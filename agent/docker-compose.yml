services:
  web:
    image: ghcr.io/dpembo/orchelium/agent:latest
    container_name: orchelium-agent
    environment:
      - AGENT_NAME=${AGENT_NAME}
      - MQTT_ENABLED=${MQTT_ENABLED}
      - MQTT_SERVER=${MQTT_SERVER}
      - MQTT_PORT=${MQTT_PORT}
      - WS_SERVER=${WS_SERVER}
      - WS_PORT=${WS_PORT}
      - WORKING_DIR=${WORKING_DIR}
    command:
      - /bin/sh
      - -c
      - |
        if [ "$MQTT_ENABLED" = "true" ]; then
          exec node agent.js --agent "$AGENT_NAME" --workingDir "$WORKING_DIR" --mqttServer "$MQTT_SERVER" --mqttPort "$MQTT_PORT"
        else
          exec node agent.js --agent "$AGENT_NAME" --workingDir "$WORKING_DIR" --wsServer "$WS_SERVER" --wsPort "$WS_PORT"
        fi
    ports:
      - "49991:49991"
    privileged: true  # Equivalent to --privileged
    pid: "host"       # Equivalent to --pid=hos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:49991/"]
      interval: 90s
      retries: 3
      start_period: 10s
      timeout: 10s
    restart: unless-stopped

